name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.12

      - name: Sync (with dev)
        run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -q

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --group dev
      - name: PyInstaller spec parse
        run: uv run pyinstaller packaging/easyclip.spec --noconfirm
      - name: List output
        run: ls -la dist/easyclip || true
