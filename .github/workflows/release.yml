name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: macos-arm64
          - os: windows-latest
            arch: x64
            platform: windows-x64
          - os: ubuntu-24.04
            arch: x64
            platform: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.12

      - name: Build and archive (Unix)
        if: runner.os != 'Windows'
        env:
          EASYCLIP_VERSION: ${{ github.ref_name }}
        run: |
          bash scripts/build_release.sh "$EASYCLIP_VERSION" "${{ matrix.platform }}"

      - name: Build and archive (Windows)
        if: runner.os == 'Windows'
        env:
          EASYCLIP_VERSION: ${{ github.ref_name }}
        run: |
          pwsh -File scripts/build_release.ps1 -Version "$env:EASYCLIP_VERSION" -Platform "${{ matrix.platform }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyClip-${{ matrix.platform }}
          path: dist/EasyClip-*.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: EasyClip-*
          merge-multiple: true
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
