name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build Release
        run: |
          powershell -File scripts/build_release.ps1
        shell: pwsh

      - name: Archive production artifacts
        run: |
          Compress-Archive -Path dist/easyclip/* -DestinationPath easyclip-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: easyclip-windows.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
